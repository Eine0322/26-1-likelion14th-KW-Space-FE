name: "⛔ Trouble Shooting"
description: "트러블슈팅 문제 해결"
labels: ["troubleShooting"]
body:
  - type: textarea
    attributes:
      label: ❗문제사항
      description: 발생한 문제에 대해 설명해주세요.
      placeholder: 자세히 적을수록 좋습니다!
    validations:
      required: true
- type: textarea
    attributes:
      label: 📖 해결 방법
      description: 문제 해결 방법을 적어주세요
      placeholder: 자세히 적을수록 좋습니다!
    validations:
      required: false
- type: input
    attributes:
      label: 🔗 관련 이슈
      description: 관련된 이슈 번호를 작성해주세요.
      placeholder: "예: Related to #12"
    validations:
      required: false
